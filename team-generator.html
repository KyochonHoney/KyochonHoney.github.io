<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>팀 편성 - FC PIR</title>
    <link rel="stylesheet" href="/assets/css/style.css">
    <style>
        body { padding-bottom: 0; }

        .tg-layout {
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 20px;
            align-items: start;
            margin-top: 24px;
        }

        /* ── 왼쪽: 멤버 선택 ── */
        .tg-members-card {
            background: white;
            border: 1px solid var(--border);
            border-radius: var(--r-lg);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }
        .tg-members-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            background: #fafafa;
        }
        .tg-members-head h3 {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-dark);
            margin: 0;
        }
        .tg-sel-btns { display: flex; gap: 6px; }
        .tg-sel-btn {
            padding: 4px 12px;
            border: 1.5px solid var(--border);
            background: white;
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--text-mid);
            cursor: pointer;
            transition: all 0.15s;
            font-family: inherit;
        }
        .tg-sel-btn:hover { border-color: var(--primary); color: var(--primary); background: #eef2ff; }

        /* 멤버 목록 */
        .member-list {
            max-height: 420px;
            overflow-y: auto;
        }
        .member-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 20px;
            border-bottom: 1px solid #f3f4f6;
            cursor: pointer;
            transition: background 0.12s;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        .member-item:last-child { border-bottom: none; }
        .member-item:hover { background: #f9fafb; }
        .member-item.selected { background: #eef2ff; }
        .member-item input[type="checkbox"] {
            width: 17px; height: 17px;
            accent-color: var(--primary);
            flex-shrink: 0;
            cursor: pointer;
        }
        .member-item-name { flex: 1; font-weight: 600; font-size: 0.95rem; }
        .member-item-badges { display: flex; gap: 4px; }

        /* 멤버 푸터 */
        .tg-members-foot {
            padding: 12px 20px;
            border-top: 1px solid var(--border);
            background: #fafafa;
            font-size: 0.875rem;
            color: var(--text-light);
        }
        .tg-members-foot strong { color: var(--primary); }

        /* ── 오른쪽: 컨트롤 패널 ── */
        .tg-control-panel {
            display: flex;
            flex-direction: column;
            gap: 16px;
            position: sticky;
            top: 80px;
        }

        /* 팀 수 선택 */
        .tg-team-count-card {
            background: white;
            border: 1px solid var(--border);
            border-radius: var(--r-lg);
            padding: 20px;
            box-shadow: var(--shadow-sm);
        }
        .tg-team-count-card label {
            display: block;
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-mid);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 10px;
        }
        .tg-team-radios { display: flex; gap: 8px; }
        .tg-team-radio {
            flex: 1;
            position: relative;
        }
        .tg-team-radio input { position: absolute; opacity: 0; width: 0; height: 0; }
        .tg-team-radio span {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            border: 2px solid var(--border);
            border-radius: var(--r-sm);
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.15s;
            color: var(--text-mid);
        }
        .tg-team-radio input:checked + span {
            border-color: var(--primary);
            background: #eef2ff;
            color: var(--primary);
        }
        .tg-team-radio span:hover { border-color: var(--primary); }

        /* 편성 버튼 */
        #generateTeamsBtn {
            width: 100%;
            padding: 14px;
            font-size: 1.05rem;
            border-radius: var(--r-md);
            letter-spacing: -0.01em;
        }

        /* 용병 패널 */
        .merc-section {
            background: white;
            border: 1px solid var(--border);
            border-radius: var(--r-lg);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }
        .merc-toggle-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
            padding: 14px 20px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-mid);
            font-family: inherit;
            text-align: left;
        }
        .merc-toggle-btn .arrow { margin-left: auto; font-size: 0.7rem; transition: transform 0.22s; }
        .merc-toggle-btn.open .arrow { transform: rotate(180deg); }
        .merc-panel { display: none; padding: 0 16px 16px; border-top: 1px solid var(--border); }
        .merc-panel.open { display: block; }

        /* 용병 칩 */
        .merc-chips { display: flex; flex-wrap: wrap; gap: 6px; margin: 12px 0; }
        .merc-chip {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 4px 8px 4px 12px;
            background: #fef9c3; border: 1px solid #fde047;
            border-radius: 20px; font-size: 0.82rem; font-weight: 600;
        }
        .merc-chip-del {
            width: 17px; height: 17px; display: flex; align-items: center; justify-content: center;
            background: #fca5a5; border-radius: 50%; border: none; cursor: pointer;
            font-size: 0.68rem; color: #7f1d1d; font-weight: 800; padding: 0; line-height: 1;
        }

        /* 용병 입력 */
        .merc-form { margin-top: 12px; }
        .merc-form-row { display: flex; gap: 6px; margin-bottom: 8px; }
        .merc-form-row .form-group { margin: 0; flex: 1; }
        .merc-form-row .form-group label { font-size: 0.75rem; margin-bottom: 3px; }
        .merc-form-row .form-control { padding: 7px 10px; font-size: 0.85rem; }
        .merc-form .btn { width: 100%; margin-top: 4px; padding: 9px; }

        /* ── 결과 ── */
        #teamResultSection { margin-top: 24px; display: none; }
        .result-summary {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 8px 16px; border-radius: 20px;
            font-weight: 700; font-size: 0.9rem; margin-bottom: 16px;
        }
        .result-teams {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 14px;
        }
        .result-team-card { border-radius: var(--r-md); overflow: hidden; box-shadow: var(--shadow-md); }
        .result-team-header {
            padding: 14px 16px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .result-team-header h3 { color: white; font-size: 1.1rem; font-weight: 800; margin: 0; }
        .result-team-meta { color: rgba(255,255,255,0.92); font-size: 0.8rem; font-weight: 600; text-align: right; line-height: 1.5; }
        .result-team-body { background: white; }
        .result-member-row {
            display: flex; align-items: center; gap: 8px;
            padding: 8px 14px; border-bottom: 1px solid #f3f4f6; font-size: 0.88rem;
        }
        .result-member-row:last-child { border-bottom: none; }
        .result-member-row .name { flex: 1; font-weight: 600; }
        .result-member-row.is-merc { background: #fefce8; }

        /* 용병 추가 섹션: 데스크탑에서는 오른쪽 패널만 표시 */
        #mercSectionLeft { display: none; }

        /* ── 모바일 ── */
        @media (max-width: 768px) {
            #mercSectionLeft { display: block; }
            body { padding-bottom: 76px; }

            .tg-layout {
                grid-template-columns: 1fr;
                margin-top: 16px;
            }

            /* 오른쪽 컨트롤 패널 - 모바일에서 숨김 (하단바로 대체) */
            .tg-control-panel { display: none; }

            .member-list { max-height: 280px; }
            .member-item { padding: 9px 16px; }

            /* 하단 고정 CTA */
            .tg-cta-bar {
                display: flex !important;
            }

            .result-teams { grid-template-columns: 1fr; }
        }

        /* 하단 고정 바 - 모바일 전용 */
        .tg-cta-bar {
            display: none;
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: white;
            border-top: 1px solid var(--border);
            padding: 12px 16px;
            gap: 10px;
            z-index: 200;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
            align-items: center;
        }
        .tg-cta-bar select {
            padding: 10px 12px;
            border: 1.5px solid var(--border);
            border-radius: var(--r-sm);
            font-family: inherit; font-size: 0.9rem; font-weight: 600;
            background: white; outline: none; cursor: pointer; flex-shrink: 0;
        }
        .tg-cta-bar select:focus { border-color: var(--primary); }
        .tg-cta-bar .btn { flex: 1; padding: 12px; font-size: 1rem; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="/" class="navbar-brand">⚽ FC PIR</a>
            <button class="navbar-toggle" id="navToggle" aria-label="메뉴 열기" aria-expanded="false">
                <span></span><span></span><span></span>
            </button>
            <div class="navbar-menu" id="navMenu">
                <a href="/">홈</a>
                <a href="/team-generator.html">팀 편성</a>
                <a href="/payment-status.html">회비 현황</a>
                <a href="/gallery.html">갤러리</a>
                <a href="/admin/">관리자</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div style="margin-top: 28px;" class="page-title">
            <h2>⚽ 팀 편성</h2>
            <p>참가 멤버를 선택하고 공평한 팀을 만들어보세요</p>
        </div>

        <div class="tg-layout">

            <!-- ── 왼쪽: 멤버 선택 ── -->
            <div>
                <div class="tg-members-card">
                    <div class="tg-members-head">
                        <h3>👥 참가 멤버</h3>
                        <div class="tg-sel-btns">
                            <button class="tg-sel-btn" id="selectAllBtn">전체 선택</button>
                            <button class="tg-sel-btn" id="deselectAllBtn">전체 해제</button>
                        </div>
                    </div>
                    <div class="member-list" id="memberList">
                        <div style="padding:24px;text-align:center;color:var(--text-muted);">불러오는 중...</div>
                    </div>
                    <div class="tg-members-foot">
                        <strong id="selectedCount">0</strong>명 선택됨
                        <span id="mercCount" style="display:none;"> &nbsp;+&nbsp; <strong id="mercCountNum" style="color:var(--warning);">0</strong>명 용병</span>
                    </div>
                </div>

                <!-- 용병 (모바일용, 데스크탑에서는 오른쪽에) -->
                <div class="merc-section" style="margin-top:12px;" id="mercSectionLeft">
                    <button class="merc-toggle-btn" id="mercToggleBtn">
                        🆕 용병 추가 <span style="font-size:0.78rem;color:var(--text-muted);font-weight:400;">(선택사항)</span>
                        <span class="arrow">▼</span>
                    </button>
                    <div class="merc-panel" id="mercPanel">
                        <div class="merc-chips" id="mercenaryList"></div>
                        <div class="merc-form">
                            <div class="merc-form-row">
                                <div class="form-group" style="flex:2;">
                                    <label>이름</label>
                                    <input type="text" id="mercName" class="form-control" placeholder="홍길동">
                                </div>
                                <div class="form-group">
                                    <label>포지션</label>
                                    <select id="mercPosition" class="form-control">
                                        <option value="ATT">공격</option>
                                        <option value="DEF">수비</option>
                                        <option value="ALL">올라운더</option>
                                    </select>
                                </div>
                                <div class="form-group" style="flex:0 0 70px;">
                                    <label>레벨</label>
                                    <input type="number" id="mercLevel" class="form-control" min="1" max="10" value="5">
                                </div>
                            </div>
                            <button id="addMercenaryBtn" class="btn btn-success">➕ 용병 추가</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ── 오른쪽: 컨트롤 패널 (데스크탑 전용) ── -->
            <div class="tg-control-panel">
                <div class="tg-team-count-card">
                    <label>팀 수</label>
                    <div class="tg-team-radios">
                        <label class="tg-team-radio">
                            <input type="radio" name="teamCount" value="2" checked>
                            <span>2팀</span>
                        </label>
                        <label class="tg-team-radio">
                            <input type="radio" name="teamCount" value="3">
                            <span>3팀</span>
                        </label>
                    </div>
                </div>

                <button id="generateTeamsBtn" class="btn btn-primary">⚽ 팀 편성하기</button>

                <div class="merc-section">
                    <button class="merc-toggle-btn" id="mercToggleBtnDesktop">
                        🆕 용병 추가 <span style="font-size:0.78rem;color:var(--text-muted);font-weight:400;">(선택사항)</span>
                        <span class="arrow">▼</span>
                    </button>
                    <div class="merc-panel" id="mercPanelDesktop">
                        <div class="merc-chips" id="mercenaryListDesktop"></div>
                        <div class="merc-form">
                            <div class="merc-form-row">
                                <div class="form-group" style="flex:1;">
                                    <label>이름</label>
                                    <input type="text" id="mercNameDesktop" class="form-control" placeholder="홍길동">
                                </div>
                            </div>
                            <div class="merc-form-row">
                                <div class="form-group">
                                    <label>포지션</label>
                                    <select id="mercPositionDesktop" class="form-control">
                                        <option value="ATT">공격</option>
                                        <option value="DEF">수비</option>
                                        <option value="ALL">올라운더</option>
                                    </select>
                                </div>
                                <div class="form-group" style="flex:0 0 80px;">
                                    <label>레벨</label>
                                    <input type="number" id="mercLevelDesktop" class="form-control" min="1" max="10" value="5">
                                </div>
                            </div>
                            <button id="addMercenaryBtnDesktop" class="btn btn-success">➕ 용병 추가</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- ── 결과 ── -->
        <div id="teamResultSection">
            <div class="card">
                <h3 class="card-title">📋 팀 편성 결과</h3>
                <div id="teamResult"></div>
            </div>
        </div>

        <div style="height: 40px;"></div>
    </div>

    <footer>
        <p>&copy; 2025 FC PIR. All rights reserved.</p>
    </footer>

    <!-- 하단 고정 CTA (모바일 전용) -->
    <div class="tg-cta-bar" id="ctaBar">
        <select id="teamCountMobile">
            <option value="2">2팀</option>
            <option value="3">3팀</option>
        </select>
        <button id="generateTeamsBtnMobile" class="btn btn-primary">⚽ 팀 편성하기</button>
    </div>

    <script src="/assets/js/nav.js"></script>
    <script src="/js/team-algorithm.js"></script>
    <script type="module">
        import storage from '/js/storage-firebase.js';

        const selectedMembers = new Set();
        const mercenaries = [];
        const memberListEl = document.getElementById('memberList');

        // 팀 수 가져오기 (데스크탑/모바일 공통)
        function getTeamCount() {
            const isMobile = window.innerWidth <= 768;
            if (isMobile) {
                return parseInt(document.getElementById('teamCountMobile').value);
            }
            const checked = document.querySelector('input[name="teamCount"]:checked');
            return checked ? parseInt(checked.value) : 2;
        }

        // ── 상태 업데이트 ──
        function updateStatus() {
            document.getElementById('selectedCount').textContent = selectedMembers.size;
            const mercCountEl = document.getElementById('mercCount');
            document.getElementById('mercCountNum').textContent = mercenaries.length;
            mercCountEl.style.display = mercenaries.length > 0 ? '' : 'none';
        }

        // ── 멤버 선택 ──
        function selectAll() {
            memberListEl.querySelectorAll('input[type="checkbox"]').forEach(cb => {
                const id = parseInt(cb.value);
                cb.checked = true;
                selectedMembers.add(id);
                cb.closest('.member-item')?.classList.add('selected');
            });
            updateStatus();
        }

        function deselectAll() {
            memberListEl.querySelectorAll('input[type="checkbox"]').forEach(cb => {
                cb.checked = false;
                cb.closest('.member-item')?.classList.remove('selected');
            });
            selectedMembers.clear();
            updateStatus();
        }

        // ── 용병 ──
        function addMercenary(nameId, posId, lvlId) {
            const name = document.getElementById(nameId).value.trim();
            const position = document.getElementById(posId).value;
            const level = parseInt(document.getElementById(lvlId).value);
            if (!name) { alert('용병 이름을 입력하세요.'); return; }
            if (level < 1 || level > 10) { alert('레벨은 1~10 사이여야 합니다.'); return; }
            mercenaries.push({ id: -(mercenaries.length + 1), name, position, level, is_mercenary: true });
            document.getElementById(nameId).value = '';
            document.getElementById(lvlId).value = 5;
            renderMercenaries();
            updateStatus();
        }

        function renderMercenaries() {
            const chips = mercenaries.map((m, i) => `
                <div class="merc-chip">
                    ${escapeHtml(m.name)}
                    <span class="badge badge-info" style="font-size:0.7rem;">${getPositionName(m.position)}</span>
                    <span style="font-size:0.78rem;color:var(--text-light);">Lv.${m.level}</span>
                    <button class="merc-chip-del" onclick="window.removeMercenary(${i})">✕</button>
                </div>
            `).join('');
            document.getElementById('mercenaryList').innerHTML = chips;
            document.getElementById('mercenaryListDesktop').innerHTML = chips;
        }

        window.removeMercenary = function(i) {
            mercenaries.splice(i, 1);
            renderMercenaries();
            updateStatus();
        };

        // ── 팀 편성 ──
        async function generateTeams() {
            const total = selectedMembers.size + mercenaries.length;
            if (total < 2) { alert('최소 2명 이상 선택하세요.'); return; }
            const teamCount = getTeamCount();
            if (total < teamCount * 2) { alert(`${teamCount}팀을 만들려면 최소 ${teamCount * 2}명이 필요합니다.`); return; }

            // 버튼 로딩
            ['generateTeamsBtn','generateTeamsBtnMobile'].forEach(id => {
                const el = document.getElementById(id);
                if (el) { el.disabled = true; el.textContent = '편성 중...'; }
            });

            try {
                const allMembers = await storage.getMembers(true);
                const selected = allMembers.filter(m => selectedMembers.has(m.id));
                if (selected.length + mercenaries.length < 2) {
                    alert('선택된 멤버 정보를 불러오지 못했습니다. 다시 시도해주세요.');
                    return;
                }
                const result = TeamBalancer.generateBalancedTeams([...selected, ...mercenaries], teamCount);

                if (!result.success) { alert(result.message); return; }

                displayResult(result);
                document.getElementById('teamResultSection').scrollIntoView({ behavior: 'smooth', block: 'start' });

                await storage.saveTeam({
                    match_date: new Date().toISOString().split('T')[0],
                    team_count: result.team_count,
                    teams: result.teams.map(t => ({
                        name: t.name,
                        members: t.members.filter(m => !m.is_mercenary).map(m => m.id),
                        mercenaries: t.members.filter(m => m.is_mercenary).map(m => ({ name: m.name, position: m.position, level: m.level })),
                        total_level: t.total_level
                    })),
                    level_diff: parseFloat(result.level_diff),
                    balance_quality: result.balance_quality
                });
            } catch (err) {
                console.error('팀 편성 오류:', err);
                alert('팀 편성 중 오류가 발생했습니다. 다시 시도해주세요.');
            } finally {
                ['generateTeamsBtn','generateTeamsBtnMobile'].forEach(id => {
                    const el = document.getElementById(id);
                    if (el) { el.disabled = false; el.textContent = '⚽ 팀 편성하기'; }
                });
            }
        }

        // ── 결과 표시 ──
        function displayResult(result) {
            const section = document.getElementById('teamResultSection');
            const el = document.getElementById('teamResult');
            section.style.display = 'block';

            const qualityColor = TeamBalancer.getBalanceQualityColor(result.balance_quality);
            const qualityText  = TeamBalancer.getBalanceQualityText(result.balance_quality);
            const summaryBg = { excellent:'#d1fae5', good:'#dbeafe', fair:'#fef9c3', poor:'#fee2e2' }[result.balance_quality] || '#f3f4f6';

            const teamCards = result.teams.map(team => `
                <div class="result-team-card">
                    <div class="result-team-header" style="background:${team.color};">
                        <h3>${team.name} <span style="font-size:0.78rem;opacity:0.85;">${team.member_count}명</span></h3>
                        <div class="result-team-meta">
                            총 ${team.total_level} · 평균 ${team.avg_level}<br>
                            공 ${team.position_att} · 수 ${team.position_def} · 올 ${team.position_all}
                        </div>
                    </div>
                    <div class="result-team-body">
                        ${team.members.map(m => `
                            <div class="result-member-row${m.is_mercenary ? ' is-merc' : ''}">
                                <span class="name">${m.is_mercenary ? '🆕 ' : ''}${escapeHtml(m.name)}</span>
                                <span class="badge badge-info">${getPositionName(m.position)}</span>
                                <span class="badge badge-warning">Lv.${m.level}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');

            el.innerHTML = `
                <div class="result-summary" style="background:${summaryBg};color:${qualityColor};">
                    밸런스 ${qualityText} &nbsp;·&nbsp; 레벨 차이 ${result.level_diff}
                </div>
                <div class="result-teams">${teamCards}</div>
            `;
        }

        // ── 유틸 ──
        function getPositionName(p) { return { ATT:'공격', DEF:'수비', ALL:'올라운더' }[p] || p; }
        function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

        // ── 초기화 ──
        async function initialize() {
            const members = await storage.getMembers(true);
            if (!members.length) {
                memberListEl.innerHTML = '<div style="padding:24px;text-align:center;color:var(--text-muted);">등록된 멤버가 없습니다.</div>';
                return;
            }
            memberListEl.innerHTML = members.map(m => `
                <div class="member-item">
                    <input type="checkbox" value="${m.id}">
                    <span class="member-item-name">${escapeHtml(m.name)}</span>
                    <div class="member-item-badges">
                        <span class="badge badge-info">${getPositionName(m.position)}</span>
                        <span class="badge badge-warning">Lv.${m.level}</span>
                    </div>
                </div>
            `).join('');
        }

        document.addEventListener('DOMContentLoaded', () => {
            initialize();

            // 버튼 이벤트
            document.getElementById('generateTeamsBtn').addEventListener('click', generateTeams);
            document.getElementById('generateTeamsBtnMobile').addEventListener('click', generateTeams);
            document.getElementById('selectAllBtn').addEventListener('click', selectAll);
            document.getElementById('deselectAllBtn').addEventListener('click', deselectAll);
            document.getElementById('addMercenaryBtn').addEventListener('click', () => addMercenary('mercName', 'mercPosition', 'mercLevel'));
            document.getElementById('addMercenaryBtnDesktop').addEventListener('click', () => addMercenary('mercNameDesktop', 'mercPositionDesktop', 'mercLevelDesktop'));

            // 멤버 선택: div 영역 클릭 시 수동 토글
            memberListEl.addEventListener('click', e => {
                const item = e.target.closest('.member-item');
                if (!item) return;
                if (e.target.type === 'checkbox') return; // checkbox 직접 클릭은 change 이벤트로 처리
                const cb = item.querySelector('input[type="checkbox"]');
                if (!cb) return;
                cb.checked = !cb.checked;
                const id = parseInt(cb.value);
                if (cb.checked) { selectedMembers.add(id); item.classList.add('selected'); }
                else { selectedMembers.delete(id); item.classList.remove('selected'); }
                updateStatus();
            });

            // checkbox 직접 클릭/변경 처리
            memberListEl.addEventListener('change', e => {
                if (e.target.type !== 'checkbox') return;
                const id = parseInt(e.target.value);
                const item = e.target.closest('.member-item');
                if (e.target.checked) { selectedMembers.add(id); item?.classList.add('selected'); }
                else { selectedMembers.delete(id); item?.classList.remove('selected'); }
                updateStatus();
            });

            // 용병 토글 (모바일)
            const mercToggle = document.getElementById('mercToggleBtn');
            const mercPanel = document.getElementById('mercPanel');
            mercToggle.addEventListener('click', () => {
                const open = mercPanel.classList.toggle('open');
                mercToggle.classList.toggle('open', open);
            });

            // 용병 토글 (데스크탑)
            const mercToggleD = document.getElementById('mercToggleBtnDesktop');
            const mercPanelD = document.getElementById('mercPanelDesktop');
            mercToggleD.addEventListener('click', () => {
                const open = mercPanelD.classList.toggle('open');
                mercToggleD.classList.toggle('open', open);
            });

            // 엔터로 용병 추가
            document.getElementById('mercName').addEventListener('keypress', e => { if (e.key === 'Enter') { e.preventDefault(); addMercenary('mercName','mercPosition','mercLevel'); } });
            document.getElementById('mercNameDesktop').addEventListener('keypress', e => { if (e.key === 'Enter') { e.preventDefault(); addMercenary('mercNameDesktop','mercPositionDesktop','mercLevelDesktop'); } });
        });
    </script>
</body>
</html>
